<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Oasis IMG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="fixed top-4 left-4 z-50 lg:hidden bg-gray-900 text-white p-3 rounded-md">
            <i class="fas fa-bars text-xl"></i>
        </button>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 w-64 bg-gray-900 text-white transition-transform duration-300 ease-in-out z-40">
            <div class="p-6">
                <h2 class="text-2xl font-bold">Oasis IMG</h2>
                <p class="text-sm text-gray-400">Admin Dashboard</p>
            </div>
            <nav class="mt-6 overflow-y-auto h-[calc(100vh-120px)]">
                <a href="index.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-home mr-3"></i> Dashboard
                </a>
                <a href="admissions.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-user-graduate mr-3"></i> Admissions
                </a>
                <a href="students.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-users mr-3"></i> Student Records
                </a>
                <a href="news.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-newspaper mr-3"></i> News
                </a>
                <a href="courses.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-book mr-3"></i> Programs Offered
                </a>
                <a href="events.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-calendar mr-3"></i> Events
                </a>
                <a href="ministries.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-church mr-3"></i> Ministries
                </a>
                <a href="contacts.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-envelope mr-3"></i> Contacts
                </a>
                <a href="gallery.html" class="flex items-center px-6 py-3 bg-blue-600 text-white">
                    <i class="fas fa-images mr-3"></i> Gallery
                </a>
                <a href="leadership.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-users mr-3"></i> Leadership
                </a>
                <button onclick="handleLogout()" class="w-full flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 mt-auto">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Overlay for mobile -->
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

        <main class="flex-1 overflow-y-auto lg:ml-0">
            <header class="bg-white shadow-sm p-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-gray-900">Gallery Management</h1>
                    <button onclick="showAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                        <i class="fas fa-plus mr-2"></i>Add Image
                    </button>
                </div>
            </header>

            <div class="p-6">
                <!-- Search Bar -->
                <div class="bg-white rounded-lg shadow p-4 mb-6">
                    <div class="flex items-center">
                        <i class="fas fa-search text-gray-400 mr-3"></i>
                        <input type="text" id="searchInput" placeholder="Search images by title or category..."
                               class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
                               oninput="handleSearch()">
                    </div>
                </div>

                <!-- Gallery Grid -->
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-bold mb-4">Gallery Images</h2>

                    <!-- Loading State -->
                    <div id="loadingState" class="text-center py-12">
                        <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
                        <p class="text-gray-600">Loading gallery...</p>
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="hidden text-center py-12">
                        <i class="fas fa-images text-6xl text-gray-300 mb-4"></i>
                        <p class="text-gray-600 mb-4">No images in gallery</p>
                        <button onclick="showAddModal()" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>Add First Image
                        </button>
                    </div>

                    <!-- Gallery Grid -->
                    <div id="galleryGrid" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="imageModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold">Add Image</h2>
                <button onclick="closeImageModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="imageForm" class="space-y-4">
                <input type="hidden" id="imageId">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Title <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="imageTitle" required
                           class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
                           placeholder="Enter image title">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Category <span class="text-red-500">*</span>
                    </label>
                    <select id="imageCategory" required
                            class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600">
                        <option value="">Select Category</option>
                        <option value="Events">Events</option>
                        <option value="Worship">Worship</option>
                        <option value="Ministry">Ministry</option>
                        <option value="Outreach">Outreach</option>
                        <option value="Facilities">Facilities</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Image <span class="text-red-500">*</span>
                    </label>
                    
                    <!-- Upload Method Toggle -->
                    <div class="flex space-x-2 mb-3">
                        <button type="button" onclick="setUploadMethod('cloudinary')" id="cloudinaryMethodBtn"
                                class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
                            <i class="fas fa-cloud-upload-alt mr-2"></i>Upload Image
                        </button>
                        <button type="button" onclick="setUploadMethod('url')" id="urlMethodBtn"
                                class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-md hover:bg-gray-50 transition">
                            <i class="fas fa-link mr-2"></i>Paste URL
                        </button>
                    </div>
                    
                    <!-- Cloudinary Upload Button -->
                    <div id="cloudinaryUploadSection" class="mb-3">
                        <button type="button" onclick="openCloudinaryWidget()"
                                class="w-full px-4 py-8 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition group">
                            <i class="fas fa-cloud-upload-alt text-3xl text-gray-400 group-hover:text-blue-500 mb-2"></i>
                            <p class="text-gray-600 group-hover:text-blue-600">Click to upload image from your device</p>
                            <p class="text-xs text-gray-400 mt-1">Supports JPG, PNG, GIF up to 10MB</p>
                        </button>
                    </div>
                    
                    <!-- URL Input Section -->
                    <div id="urlInputSection" class="hidden mb-3">
                        <input type="url" id="imageUrl"
                               class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
                               placeholder="Paste Google Drive link, Cloudinary URL, or direct image URL" onchange="updateGalleryImagePreview()">
                        <p class="text-sm text-gray-500 mt-1">
                            <i class="fas fa-info-circle mr-1"></i>
                            Supports Google Drive, Cloudinary, and direct image URLs
                        </p>
                    </div>
                    
                    <!-- Hidden input to store the final URL -->
                    <input type="hidden" id="finalImageUrl" required>
                    
                    <div id="gallery-image-preview" class="mt-3 text-center bg-gray-50 rounded-lg p-4">
                        <p class="text-gray-400 text-sm">No image selected</p>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Description
                    </label>
                    <textarea id="imageDescription" rows="3"
                              class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-600"
                              placeholder="Enter image description (optional)"></textarea>
                </div>

                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeImageModal()"
                            class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50">
                        Cancel
                    </button>
                    <button type="submit" id="submitBtn"
                            class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                        <i class="fas fa-save mr-2"></i>Save Image
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../assets/js/supabase-config.js';
        import { cloudinaryConfig } from '../assets/js/cloudinary-config.js';
        import { getOptimizedImageUrl, isCloudinaryUrl } from '../assets/js/cloudinary-utils.js';

        // Global variables
        let galleryData = [];
        let filteredData = [];
        let uploadWidget = null;
        let currentUploadMethod = 'cloudinary';

        // Initialize Cloudinary Upload Widget
        function initCloudinaryWidget() {
            if (typeof cloudinary !== 'undefined' && cloudinary.createUploadWidget) {
                uploadWidget = cloudinary.createUploadWidget({
                    cloudName: cloudinaryConfig.cloudName,
                    uploadPreset: cloudinaryConfig.uploadPreset,
                    folder: 'oasis-img/gallery',
                    sources: ['local', 'url', 'camera'],
                    multiple: false,
                    maxFiles: 1,
                    maxFileSize: 10000000, // 10MB
                    resourceType: 'image',
                    clientAllowedFormats: ['jpg', 'jpeg', 'png', 'gif', 'webp'],
                    styles: {
                        palette: {
                            window: '#FFFFFF',
                            windowBorder: '#90A0B3',
                            tabIcon: '#2563EB',
                            menuIcons: '#5A616A',
                            textDark: '#000000',
                            textLight: '#FFFFFF',
                            link: '#2563EB',
                            action: '#2563EB',
                            inactiveTabIcon: '#6B7280',
                            error: '#EF4444',
                            inProgress: '#2563EB',
                            complete: '#10B981',
                            sourceBg: '#F3F4F6'
                        }
                    }
                }, (error, result) => {
                    if (error) {
                        console.error('Upload Widget Error:', error);
                        showToast('Upload failed: ' + error.message, 'error');
                        return;
                    }

                    if (result.event === 'success') {
                        const imageUrl = result.info.secure_url;
                        document.getElementById('finalImageUrl').value = imageUrl;
                        document.getElementById('imageUrl').value = imageUrl;
                        
                        // Update preview
                        const previewDiv = document.getElementById('gallery-image-preview');
                        previewDiv.innerHTML = `
                            <img src="${imageUrl}" class="w-full h-40 object-cover rounded-lg" alt="Uploaded image">
                            <p class="text-green-600 text-sm mt-2"><i class="fas fa-check-circle mr-1"></i>Image uploaded successfully!</p>
                        `;
                        
                        showToast('Image uploaded successfully!', 'success');
                    }
                });
            }
        }

        // Open Cloudinary Widget
        window.openCloudinaryWidget = function() {
            if (uploadWidget) {
                uploadWidget.open();
            } else {
                showToast('Upload widget not initialized. Please check Cloudinary configuration.', 'error');
            }
        };

        // Set upload method
        window.setUploadMethod = function(method) {
            currentUploadMethod = method;
            
            const cloudinaryBtn = document.getElementById('cloudinaryMethodBtn');
            const urlBtn = document.getElementById('urlMethodBtn');
            const cloudinarySection = document.getElementById('cloudinaryUploadSection');
            const urlSection = document.getElementById('urlInputSection');
            
            if (method === 'cloudinary') {
                cloudinaryBtn.classList.add('bg-blue-600', 'text-white');
                cloudinaryBtn.classList.remove('border', 'border-gray-300', 'text-gray-700');
                urlBtn.classList.remove('bg-blue-600', 'text-white');
                urlBtn.classList.add('border', 'border-gray-300', 'text-gray-700');
                cloudinarySection.classList.remove('hidden');
                urlSection.classList.add('hidden');
            } else {
                urlBtn.classList.add('bg-blue-600', 'text-white');
                urlBtn.classList.remove('border', 'border-gray-300', 'text-gray-700');
                cloudinaryBtn.classList.remove('bg-blue-600', 'text-white');
                cloudinaryBtn.classList.add('border', 'border-gray-300', 'text-gray-700');
                urlSection.classList.remove('hidden');
                cloudinarySection.classList.add('hidden');
            }
        };

        // Update gallery image preview
        window.updateGalleryImagePreview = function() {
            const imageInput = document.getElementById('imageUrl').value;
            const previewDiv = document.getElementById('gallery-image-preview');
            
            if (!imageInput.trim()) {
                previewDiv.innerHTML = '<p class="text-gray-400 text-sm">No image selected</p>';
                document.getElementById('finalImageUrl').value = '';
                return;
            }
            
            // Check if it's a Cloudinary URL
            if (imageInput.includes('cloudinary.com')) {
                previewDiv.innerHTML = '<p class="text-blue-500 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>Loading preview...</p>';
                const optimizedUrl = getOptimizedImageUrl(imageInput, 'card');
                const img = new Image();
                img.onload = () => {
                    previewDiv.innerHTML = `<img src="${optimizedUrl}" class="w-full h-40 object-cover rounded-lg" alt="Image preview">`;
                    document.getElementById('finalImageUrl').value = imageInput;
                };
                img.onerror = () => {
                    previewDiv.innerHTML = '<p class="text-yellow-600 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>Preview failed - check URL</p>';
                };
                img.src = optimizedUrl;
                return;
            }
            
            // Try as direct URL
            previewDiv.innerHTML = '<p class="text-blue-500 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>Loading preview...</p>';
            const img = new Image();
            img.onload = () => {
                previewDiv.innerHTML = `<img src="${imageInput}" class="w-full h-40 object-cover rounded-lg" alt="Image preview">`;
                document.getElementById('finalImageUrl').value = imageInput;
            };
            img.onerror = () => {
                previewDiv.innerHTML = '<p class="text-yellow-600 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>Invalid URL or image not accessible</p>';
            };
            img.src = imageInput;
        };
        window.handleLogout = async function() {
            try {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error signing out:', error);
                alert('Error signing out: ' + error.message);
            }
        };

        // Auth state check
        supabase.auth.onAuthStateChange((_event, session) => {
            if (!session?.user) {
                window.location.href = 'login.html';
            } else {
                initCloudinaryWidget();
                loadGallery();
            }
        });

        // Load Gallery from Supabase
        async function loadGallery() {
            try {
                const loadingState = document.getElementById('loadingState');
                const emptyState = document.getElementById('emptyState');
                const galleryGrid = document.getElementById('galleryGrid');

                loadingState.classList.remove('hidden');
                emptyState.classList.add('hidden');
                galleryGrid.classList.add('hidden');

                const { data: rows, error } = await supabase.from('gallery').select('*').order('upload_date', { ascending: false });
                if (error) throw error;

                galleryData = rows || [];
                filteredData = [...galleryData];
                renderGallery();

                loadingState.classList.add('hidden');

                if (galleryData.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    galleryGrid.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading gallery:', error);
                showToast('Error loading gallery: ' + error.message, 'error');
                document.getElementById('loadingState').classList.add('hidden');
            }
        }

        // Render Gallery
        function renderGallery() {
            const galleryGrid = document.getElementById('galleryGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredData.length === 0) {
                galleryGrid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            galleryGrid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            galleryGrid.innerHTML = '';

            filteredData.forEach(image => {
                let imageUrl = image.image_url;
                
                // Handle Cloudinary URLs - apply optimizations
                if (imageUrl && imageUrl.includes('cloudinary.com')) {
                    imageUrl = getOptimizedImageUrl(imageUrl, 'card');
                }

                const uploadDate = image.upload_date?.toDate ?
                    image.upload_date.toDate() : new Date(image.upload_date);

                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition';
                card.innerHTML = `
                    <div class="relative group">
                        <img src="${imageUrl}" alt="${image.title}"
                             class="w-full h-48 object-cover"
                             onerror="this.src='../assets/images/logo.jpg'">
                        <div class="absolute top-2 right-2 flex space-x-2 opacity-0 group-hover:opacity-100 transition">
                            <button onclick="editImage('${image.id}')"
                                    class="bg-blue-600 text-white p-2 rounded-full hover:bg-blue-700 shadow-lg">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteImage('${image.id}')"
                                    class="bg-red-600 text-white p-2 rounded-full hover:bg-red-700 shadow-lg">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-bold text-gray-900 mb-2">${image.title}</h3>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded">
                                ${image.category}
                            </span>
                            <span class="text-sm text-gray-500">
                                <i class="fas fa-calendar mr-1"></i>
                                ${uploadDate.toLocaleDateString()}
                            </span>
                        </div>
                        ${image.description ? `
                            <p class="text-sm text-gray-600 mt-2 line-clamp-2">${image.description}</p>
                        ` : ''}
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Search functionality
        window.handleSearch = function() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            if (searchTerm === '') {
                filteredData = [...galleryData];
            } else {
                filteredData = galleryData.filter(image =>
                    image.title.toLowerCase().includes(searchTerm) ||
                    image.category.toLowerCase().includes(searchTerm) ||
                    (image.description && image.description.toLowerCase().includes(searchTerm))
                );
            }

            renderGallery();
        };

        // Show Add Modal
        window.showAddModal = function() {
            document.getElementById('modalTitle').textContent = 'Add Image';
            document.getElementById('imageForm').reset();
            document.getElementById('imageId').value = '';
            document.getElementById('finalImageUrl').value = '';
            document.getElementById('gallery-image-preview').innerHTML = '<p class="text-gray-400 text-sm">No image selected</p>';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i>Save Image';
            setUploadMethod('cloudinary');
            document.getElementById('imageModal').classList.remove('hidden');
        };

        // Show Edit Modal
        window.editImage = async function(id) {
            const image = galleryData.find(img => img.id === id);
            if (!image) return;

            document.getElementById('modalTitle').textContent = 'Edit Image';
            document.getElementById('imageId').value = id;
            document.getElementById('imageTitle').value = image.title;
            document.getElementById('imageCategory').value = image.category;
            document.getElementById('imageUrl').value = image.image_url;
            document.getElementById('finalImageUrl').value = image.image_url;
            document.getElementById('imageDescription').value = image.description || '';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save mr-2"></i>Update Image';
            
            // Set the appropriate method and show preview
            setUploadMethod('url');
            updateGalleryImagePreview();
            
            document.getElementById('imageModal').classList.remove('hidden');
        };

        // Close Modal
        window.closeImageModal = function() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('imageForm').reset();
            document.getElementById('finalImageUrl').value = '';
            document.getElementById('gallery-image-preview').innerHTML = '<p class="text-gray-400 text-sm">No image selected</p>';
        };

        // Handle Form Submit
        document.getElementById('imageForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';
            submitBtn.disabled = true;

            try {
                const imageId = document.getElementById('imageId').value;
                
                // Get image URL from either finalImageUrl (for uploads) or imageUrl (for URL input)
                let imageUrl = document.getElementById('finalImageUrl').value || document.getElementById('imageUrl').value;
                
                if (!imageUrl) {
                    showToast('Please upload an image or enter an image URL', 'error');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                const imageData = {
                    title: document.getElementById('imageTitle').value,
                    category: document.getElementById('imageCategory').value,
                    image_url: imageUrl,
                    description: document.getElementById('imageDescription').value,
                    upload_date: new Date().toISOString(),
                    source: imageUrl.includes('cloudinary.com') ? 'cloudinary' : 'external'
                };

                if (imageId) {
                    const { error } = await supabase.from('gallery').update(imageData).eq('id', imageId);
                    if (error) throw error;
                    showToast('Image updated successfully!', 'success');
                } else {
                    const { error } = await supabase.from('gallery').insert(imageData);
                    if (error) throw error;
                    showToast('Image added successfully!', 'success');
                }

                closeImageModal();
                loadGallery(); // fire-and-forget so button unlocks immediately
            } catch (error) {
                console.error('Error saving image:', error);
                showToast('Error saving image: ' + error.message, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Delete Image
        window.deleteImage = async function(id) {
            const image = galleryData.find(img => img.id === id);
            if (!image) return;

            if (!confirm(`Are you sure you want to delete "${image.title}"?`)) {
                return;
            }

            try {
                const { error: deleteError } = await supabase.from('gallery').delete().eq('id', id);
                if (deleteError) throw deleteError;
                showToast('Image deleted successfully!', 'success');
                loadGallery(); // fire-and-forget
            } catch (error) {
                console.error('Error deleting image:', error);
                showToast('Error deleting image: ' + error.message, 'error');
            }
        };

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' :
                           type === 'error' ? 'bg-red-600' : 'bg-blue-600';

            toast.className = `fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50 flex items-center space-x-2`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 5000);
        }

        // Load Google Drive URL converter
        const script = document.createElement('script');
        script.src = '../assets/js/main.js';
        script.type = 'module';
        document.head.appendChild(script);

        // Export functions
        window.loadGallery = loadGallery;
    </script>

    <script>
        // Mobile sidebar toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
