<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/assets/images/logo.jpg" type="image/jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leadership - Oasis IMG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="fixed top-4 left-4 z-50 lg:hidden bg-gray-900 text-white p-3 rounded-md">
            <i class="fas fa-bars text-xl"></i>
        </button>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 transform -translate-x-full lg:translate-x-0 w-64 bg-gray-900 text-white transition-transform duration-300 ease-in-out z-40">
            <div class="p-6">
                <h2 class="text-2xl font-bold">Oasis IMG</h2>
                <p class="text-sm text-gray-400">Admin Dashboard</p>
            </div>
            <nav class="mt-6 overflow-y-auto h-[calc(100vh-120px)]">
                <a href="index.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-home mr-3"></i> Dashboard
                </a>
                <a href="admissions.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-user-graduate mr-3"></i> Admissions
                </a>
                <a href="students.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-users mr-3"></i> Student Records
                </a>
                <a href="news.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-newspaper mr-3"></i> News
                </a>
                <a href="courses.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-book mr-3"></i> Programs Offered
                </a>
                <a href="events.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-calendar mr-3"></i> Events
                </a>
                <a href="ministries.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-church mr-3"></i> Ministries
                </a>
                <a href="contacts.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-envelope mr-3"></i> Contacts
                </a>
                <a href="gallery.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800">
                    <i class="fas fa-images mr-3"></i> Gallery
                </a>
                <a href="leadership.html" class="flex items-center px-6 py-3 bg-blue-600 text-white">
                    <i class="fas fa-users mr-3"></i> Leadership
                </a>
                <button onclick="handleLogout()" class="w-full flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 mt-auto">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </button>
            </nav>
        </aside>

        <!-- Overlay for mobile -->
        <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden"></div>

        <main class="flex-1 overflow-y-auto lg:ml-0">
            <header class="bg-white shadow-sm p-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-gray-900">Leadership Management</h1>
                    <button onclick="showAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                        <i class="fas fa-plus mr-2"></i>Add Leader
                    </button>
                </div>
            </header>

            <div class="p-6">
                <div class="bg-white rounded-lg shadow">
                    <div class="p-4 border-b flex justify-between items-center">
                        <h2 class="text-lg font-bold">Current Leaders</h2>
                        <input type="text" id="search-input" placeholder="Search leaders..." class="px-4 py-2 border rounded-md w-64">
                    </div>

                    <div id="leadership-list" class="divide-y">
                        <div class="p-12 text-center text-gray-500">
                            <i class="fas fa-spinner fa-spin text-3xl mb-4"></i>
                            <p>Loading leaders...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="leaderModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg max-w-2xl w-full p-6 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-bold">Add Leader</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>

            <form id="leaderForm" class="space-y-4" autocomplete="off">
                <input type="hidden" id="leader-id">

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name *</label>
                        <input type="text" id="leader-name" name="name" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Title/Position *</label>
                        <input type="text" id="leader-title" name="title" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Category *</label>
                    <select id="leader-category" name="category" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600">
                        <option value="">Select Category</option>
                        <option value="Senior Leadership">Senior Leadership</option>
                        <option value="Board Members">Board Members</option>
                        <option value="Ministry Leaders">Ministry Leaders</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Profile Image *</label>
                    <input type="file" id="leader-image-file" accept="image/*" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600" />
                    <input type="hidden" id="leader-image" name="image" />
                    <button type="button" id="upload-leader-image" class="mt-2 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600"><i class="fas fa-upload mr-2"></i>Upload Image</button>
                    <div id="leader-image-preview" class="mt-3 text-center bg-gray-50 rounded-lg p-4">
                        <p class="text-gray-400 text-sm">No image selected</p>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Upload a JPG, PNG, or WebP image (max 5MB)</p>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Biography *</label>
                    <textarea id="leader-bio" name="bio" rows="4" required placeholder="Brief description about the leader..." class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Display Order</label>
                    <input type="number" id="leader-order" name="order" min="1" value="1" class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-600">
                    <p class="text-xs text-gray-500 mt-1">Lower numbers appear first</p>
                </div>

                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 border rounded-md hover:bg-gray-50">Cancel</button>
                    <button type="submit" id="submit-btn" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700" disabled>
                        <i class="fas fa-save mr-2"></i>Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../assets/js/supabase-config.js';
        import { uploadImage } from '../assets/js/cloudinary-utils.js';
        // Global variables
        let allLeaders = [];
        let editingId = null;

        // Cloudinary image upload and preview
        const imageFileInput = document.getElementById('leader-image-file');
        const imageUrlInput = document.getElementById('leader-image');
        const uploadBtn = document.getElementById('upload-leader-image');
        const previewDiv = document.getElementById('leader-image-preview');

        uploadBtn.addEventListener('click', async () => {
            const file = imageFileInput.files[0];
            if (!file) {
                alert('Please select an image file to upload.');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Image size must be less than 5MB.');
                return;
            }
            previewDiv.innerHTML = '<p class="text-blue-500 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>Uploading image...</p>';
            try {
                const result = await uploadImage(file, { folder: 'leadership' });
                imageUrlInput.value = result.url;
                previewDiv.innerHTML = `<img src="${result.url}" class="w-full h-40 object-cover rounded-lg" alt="Image preview">`;
                // Enable submit button when image is uploaded
                document.getElementById('submit-btn').disabled = false;
            } catch (err) {
                previewDiv.innerHTML = '<p class="text-red-600 text-sm"><i class="fas fa-exclamation-triangle mr-2"></i>Upload failed. Please try again.</p>';
                document.getElementById('submit-btn').disabled = true;
            }
        });

        // Disable submit button if image is not present
        imageFileInput.addEventListener('change', () => {
            if (!imageFileInput.files[0]) {
                document.getElementById('submit-btn').disabled = true;
            }
        });

        window.handleLogout = async function() {
            try {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Error signing out:', error);
                alert('Error signing out: ' + error.message);
            }
        };

        // Immediately check session and load data
        (async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session?.user) {
                window.location.href = 'login.html';
                return;
            }
            await loadLeaders();
        })();

        // Redirect on future session expiry / logout
        supabase.auth.onAuthStateChange((_event, session) => {
            if (!session?.user) {
                window.location.href = 'login.html';
            }
        });

        // Load all leaders
        async function loadLeaders() {
            try {
                const { data: rows, error } = await supabase.from('leadership').select('*').order('sort_order', { ascending: true });
                if (error) throw error;
                allLeaders = rows || [];

                // Sort by order then name
                allLeaders.sort((a, b) => {
                    const orderDiff = (a.sort_order || 999) - (b.sort_order || 999);
                    if (orderDiff !== 0) return orderDiff;
                    return (a.name || '').localeCompare(b.name || '');
                });

                renderLeaders();
            } catch (error) {
                console.error('Error loading leaders:', error);
                document.getElementById('leadership-list').innerHTML = `
                    <div class="p-12 text-center text-red-500">
                        <i class="fas fa-exclamation-triangle text-3xl mb-4"></i>
                        <p>Error loading leaders. Please refresh the page.</p>
                        <p class="text-sm mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Render leaders list
        function renderLeaders(leadersArray = allLeaders) {
            const list = document.getElementById('leadership-list');

            if (leadersArray.length === 0) {
                list.innerHTML = `
                    <div class="p-12 text-center text-gray-500">
                        <i class="fas fa-users text-5xl mb-4"></i>
                        <p>No leaders yet. Click "Add Leader" to create one.</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = leadersArray.map(leader => {
                const imageUrl = leader.image && leader.image.startsWith('http') ? leader.image : '../assets/images/logo.jpg';
                return `
                    <div class="p-6 flex items-center justify-between">
                        <div class="flex items-center space-x-4">
                            <img src="${imageUrl}" class="w-16 h-16 rounded-full object-cover" alt="${leader.name}" onerror="this.src='../assets/images/logo.jpg'">
                            <div>
                                <h3 class="font-bold text-lg">${leader.name}</h3>
                                <p class="text-gray-600">${leader.title}</p>
                                <div class="flex items-center space-x-3 text-sm text-gray-500 mt-1">
                                    <span><i class="fas fa-tag mr-1"></i>${leader.category || 'Uncategorized'}</span>
                                    <span><i class="fas fa-sort-numeric-down mr-1"></i>Order: ${leader.order || 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button onclick="editLeader('${leader.id}')" class="text-blue-600 hover:text-blue-700 p-2" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteLeader('${leader.id}')" class="text-red-600 hover:text-red-700 p-2" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allLeaders.filter(leader =>
                leader.name?.toLowerCase().includes(searchTerm) ||
                leader.title?.toLowerCase().includes(searchTerm) ||
                leader.category?.toLowerCase().includes(searchTerm)
            );
            renderLeaders(filtered);
        });

        // Show add modal
        window.showAddModal = function() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add Leader';
            document.getElementById('leaderForm').reset();
            document.getElementById('leader-id').value = '';
            document.getElementById('leader-image-preview').innerHTML = '<p class="text-gray-400 text-sm">No image selected</p>';
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('leaderModal').classList.remove('hidden');
        };

        // Edit leader
        window.editLeader = function(id) {
            editingId = id;
            const leader = allLeaders.find(l => l.id === id);
            if (!leader) return;

            document.getElementById('modal-title').textContent = 'Edit Leader';
            document.getElementById('leader-id').value = id;
            document.getElementById('leader-name').value = leader.name || '';
            document.getElementById('leader-title').value = leader.title || '';
            document.getElementById('leader-category').value = leader.category || '';
            document.getElementById('leader-image').value = leader.image || '';
            document.getElementById('leader-bio').value = leader.bio || '';
            document.getElementById('leader-order').value = leader.sort_order || 1;
            // Show existing image preview and enable submit
            if (leader.image) {
                document.getElementById('leader-image-preview').innerHTML = `<img src="${leader.image}" class="w-full h-40 object-cover rounded-lg" alt="Current image">`;
                document.getElementById('submit-btn').disabled = false;
            } else {
                document.getElementById('leader-image-preview').innerHTML = '<p class="text-gray-400 text-sm">No image selected</p>';
                document.getElementById('submit-btn').disabled = true;
            }
            document.getElementById('leaderModal').classList.remove('hidden');
        };

        // Delete leader
        window.deleteLeader = async function(id) {
            if (!confirm('Are you sure you want to delete this leader?')) return;

            try {
                const { error: deleteError } = await supabase.from('leadership').delete().eq('id', id);
                if (deleteError) throw deleteError;
                alert('Leader deleted successfully!');
                await loadLeaders();
            } catch (error) {
                console.error('Error deleting leader:', error);
                alert('Error deleting leader: ' + error.message);
            }
        };

        // Close modal
        window.closeModal = function() {
            document.getElementById('leaderModal').classList.add('hidden');
            document.getElementById('leaderForm').reset();
            editingId = null;
        };

        // Form submit
        document.getElementById('leaderForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';

            const formData = new FormData(e.target);

            // Validate image field
            const imageVal = formData.get('image');
            if (!imageVal) {
                alert('Please upload a profile image before saving.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
                return;
            }

            const data = {
                name: formData.get('name'),
                title: formData.get('title'),
                category: formData.get('category'),
                image: imageVal,
                bio: formData.get('bio'),
                sort_order: parseInt(formData.get('order')) || 1
            };

            try {
                if (editingId) {
                    const { error } = await supabase.from('leadership').update(data).eq('id', editingId);
                    if (error) throw error;
                    alert('Leader updated successfully!');
                } else {
                    data.created_at = new Date().toISOString();
                    const { error } = await supabase.from('leadership').insert(data);
                    if (error) throw error;
                    alert('Leader added successfully!');
                }

                closeModal();
                await loadLeaders();
            } catch (error) {
                console.error('Error saving leader:', error);
                alert('Error saving leader: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>

    <script>
        // Mobile sidebar toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        mobileMenuBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
